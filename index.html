<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status: Agenda da Rafa</title>
    <style>
        :root {
            --grena: #7a0d1e;
            --vermelho-vibrante: #d91e36;
            --branco-puro: #ffffff;
            --gelo: #f8f9fa;
            --sombra: rgba(122, 13, 30, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Design 2: Fundo com gradiente elegante */
            background: radial-gradient(circle at center, var(--branco-puro) 0%, #f2d5d8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        #container {
            background: var(--branco-puro);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px var(--sombra);
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(122, 13, 30, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Detalhe estético no topo */
        #container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px;
            background: linear-gradient(90deg, var(--grena), var(--vermelho-vibrante));
        }

        /* Design 1: Formato da foto melhorado */
        .foto-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(45deg, var(--grena), var(--vermelho-vibrante));
            box-shadow: 0 10px 20px var(--sombra);
        }

        #foto-rafa {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--branco-puro);
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--grena);
            margin: 15px 0 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 900;
        }

        /* Design 2: Efeito de Urgência (Barra de Stress) */
        .stress-box {
            margin: 25px 0;
            background: #fff5f6;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #fce4e7;
        }

        .stress-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--grena);
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stress-bar-bg {
            background: #e0e0e0;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .stress-bar-fill {
            height: 100%;
            width: 0%; /* Animado pelo JS */
            background: linear-gradient(90deg, var(--vermelho-vibrante), var(--grena));
            box-shadow: 0 0 10px rgba(217, 30, 54, 0.4);
            transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Cronômetro com Animação */
        #timer {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--grena);
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .tempo-detalhe {
            font-size: 1rem;
            color: var(--vermelho-vibrante);
            margin-top: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        #frase-status {
            font-style: italic;
            color: #666;
            font-size: 0.95rem;
            margin-top: 15px;
            min-height: 2.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

    </style>
</head>
<body>

    <div id="container">
        <div class="foto-wrapper">
            <img id="foto-rafa" src="sua-foto.jpg" alt="Rafa">
        </div>
        
        <h1>Agenda Lotada</h1>
        
        <div class="stress-box">
            <div class="stress-label">
                <span>Nível de Ocupação</span>
                <span id="stress-percent">0%</span>
            </div>
            <div class="stress-bar-bg">
                <div id="stress-fill" class="stress-bar-fill"></div>
            </div>
        </div>

        <div id="timer">
            <span id="dias-count">0</span>
            <span class="tempo-detalhe" id="relogio-count">00:00:00</span>
        </div>
        
        <p id="frase-status">Sincronizando cronograma...</p>
    </div>

    <script>
        // Data de início: 12/03/2026 às 0h
        const dataInicio = new Date(Date.UTC(2026, 2, 12, 0, 0, 0));

        // Lista de frases atualizada
        const frases = [
            "Dormir é para os fracos, a Rafa tem planilhas.",
            "Vaga na agenda? Só com indicação do Papa.",
            "Status: Construindo um império, um café por vez.",
            "Se encontrar a Rafa, ofereça um energético.",
            "Agenda fechada por tempo indeterminado. Tente em 2027.",
            "A produtividade aqui já quebrou o ponteiro!",
            "Rafa operando em modo: Milagreiro Ativado."
        ];

        function atualizarPagina() {
            const agora = new Date();
            const diff = agora - dataInicio;

            if (diff < 0) {
                document.getElementById('timer').innerHTML = "A contagem regressiva ainda não começou.";
                return;
            }

            const dias = Math.floor(diff / 86400000);
            const horas = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            const minutos = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            const segundos = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

            // Atualiza números
            document.getElementById('dias-count').innerText = dias + " DIAS";
            document.getElementById('relogio-count').innerText = `${horas}:${minutos}:${segundos}`;

            // Lógica da Barra de Ocupação (Simula atingir 98% em 30 dias)
            let ocupacao = Math.min((dias / 30) * 100, 98).toFixed(1);
            if (dias > 30) ocupacao = (98 + Math.random() * 1.5).toFixed(1); // Oscilação realista

            document.getElementById('stress-fill').style.width = ocupacao + "%";
            document.getElementById('stress-percent').innerText = ocupacao + "%";

            // Troca a frase aleatoriamente a cada atualização de página (ou a cada 10 seg)
            if (!window.fraseDefinida) {
                document.getElementById('frase-status').innerText = frases[Math.floor(Math.random() * frases.length)];
                window.fraseDefinida = true;
            }
        }

        // Executa a cada segundo
        setInterval(atualizarPagina, 1000);
        atualizarPagina();
    </script>
</body>
</html>
